<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學/科大入學資格判定系統 (Ver 6.2 終極完整版)</title>
    <style>
        :root { --primary: #003366; --accent: #c0392b; --pass: #27ae60; --fail: #7f8c8d; --bg: #f4f6f7; }
        body { font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-top: 5px solid var(--accent); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 1.8rem; }
        .header-note { text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* 區塊樣式 */
        .section { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 25px; margin-bottom: 25px; position: relative; }
        .section-tag { position: absolute; top: -12px; left: 20px; background: var(--primary); color: white; padding: 3px 12px; font-size: 0.85rem; border-radius: 4px; font-weight: bold; letter-spacing: 1px; }
        
        /* 表單排版 */
        .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 15px; }
        .col { flex: 1; min-width: 280px; }
        
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.95rem; color: #34495e; }
        select, input { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 1rem; box-sizing: border-box; transition: 0.2s; background: #fdfdfd; }
        select:focus, input:focus { border-color: var(--accent); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.15); }
        small { display: block; color: #7f8c8d; font-size: 0.85rem; margin-top: 5px; }

        /* 動態面板 */
        .dynamic-panel { display: none; background: #fff9f9; border: 1px dashed #e6b0aa; padding: 15px; border-radius: 6px; margin-top: 10px; }
        
        /* Checkbox Grid */
        .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; margin-top: 10px; }
        .check-item { display: flex; align-items: flex-start; padding: 12px; background: #f2f4f6; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .check-item:hover { background: #e8ebed; border-color: #bdc3c7; }
        .check-item input { width: auto; margin-right: 12px; margin-top: 4px; }
        .check-item span { font-size: 0.9rem; line-height: 1.5; color: #555; }

        /* 按鈕 */
        .btn-analyze { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-analyze:hover { background: #a93226; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* 結果展示 */
        .result-area { margin-top: 40px; display: none; border-top: 2px solid #eee; padding-top: 30px; }
        .result-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 25px; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .result-card.pass { border-left: 6px solid var(--pass); }
        .result-card.fail { border-left: 6px solid var(--fail); opacity: 0.7; background: #fafafa; }
        
        .badge { float: right; padding: 6px 15px; border-radius: 30px; color: white; font-size: 0.85rem; font-weight: bold; letter-spacing: 0.5px; }
        .badge.pass { background: var(--pass); }
        .badge.fail { background: var(--fail); }
        
        .card-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .reason-list { padding-left: 20px; color: #34495e; margin: 0; }
        .reason-list li { margin-bottom: 8px; line-height: 1.5; }
        
        /* 強調文字 */
        .highlight-red { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-note">
        <h1>🎓 正修-招生入學資格判定系統</h1>
        <div>依據《入學大學同等學力認定標準》第1~11條完整運算</div>
    </div>

    <div class="section">
        <div class="section-tag">基本條件</div>
        <div class="row">
            <div class="col">
                <label>預計入學/考試日期</label>
                <input type="date" id="targetDate">
                <small>用於計算離校年資 (請依各學制簡章規定設定)</small>
            </div>
            <div class="col">
                <label>您的年齡區間</label>
                <select id="ageRange">
                    <option value="under18">未滿 18 歲</option>
                    <option value="18to21">年滿 18 歲 (但未滿 22 歲)</option>
                    <option value="22plus">年滿 22 歲 (含以上)</option>
                </select>
                <small>僅用於判定年齡門檻 (不涉及生日個資)</small>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-tag">學歷背景</div>
        <div class="row">
            <div class="col">
                <label>學校層級/學制</label>
                <select id="eduLevel" onchange="updateUI()">
                    <option value="none">-- 無 / 僅有國中學歷 --</option>
                    <option value="high">普通高中 (Senior High)</option>
                    <option value="vocational">技術型高中/高職 (Vocational)</option>
                    <option value="poly_5">五專 (5-Year College)</option>
                    <option value="poly_3">三專 (3-Year College)</option>
                    <option value="poly_2">二專 (2-Year College)</option>
                    <option value="poly_equiv">專科同等學力 (進修/鑑定)</option>
                    <option value="bachelor">大學學士班 (Bachelor)</option>
                    <option value="open_univ">空中大學 (全修生)</option>
                    <option value="master">碩士班 (Master)</option>
                </select>
            </div>
            <div class="col">
                <label>修業狀態</label>
                <select id="eduStatus" onchange="updateUI()">
                    <option value="graduated">畢業 (Graduated)</option>
                    <option value="dropout">肄業/休學/退學 (Incomplete)</option>
                </select>
            </div>
        </div>

        <div class="dynamic-panel" id="datePanel" style="display:block;">
            <div class="row">
                <div class="col">
                    <label id="dateLabel">畢業證書/修業證明書之離校日期</label>
                    <input type="date" id="leaveDate">
                </div>
            </div>
        </div>

        <div class="dynamic-panel" id="dropoutPanel">
            <div class="row">
                <div class="col">
                    <label>最後「持有成績證明」之年級</label>
                    <select id="lastGrade">
                        <option value="0">請選擇</option>
                        <option value="1">一年級</option>
                        <option value="2">二年級</option>
                        <option value="3">三年級</option>
                        <option value="4">四年級</option>
                        <option value="5">五年級</option>
                        <option value="6">六年級</option>
                    </select>
                </div>
                <div class="col">
                    <label>該年級之學期紀錄</label>
                    <select id="lastSemester">
                        <option value="1">上學期 (僅有上學期成績)</option>
                        <option value="2">下學期 (持有下學期成績)</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>累計修習學分數 (Credits)</label>
                    <input type="number" id="credits" placeholder="0">
                    <small class="highlight-red">*空大/二專/五專肄業請務必填寫此欄</small>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-tag">技能與特殊資格</div>
        <div class="row">
            <div class="col">
                <label>技術士證照</label>
                <select id="license" onchange="updateUI()">
                    <option value="none">無</option>
                    <option value="C">丙級 (Level C)</option>
                    <option value="B">乙級 (Level B)</option>
                    <option value="A">甲級 (Level A)</option>
                </select>
            </div>
            <div class="col" id="workPanel" style="display:none;">
                <label>相關工作經驗年資 (年)</label>
                <input type="number" id="workExp" step="0.5" min="0" placeholder="例如: 5.0">
            </div>
        </div>

        <div class="row" style="margin-top:15px;">
            <div class="col">
                <label>推廣教育/職訓課程累計學分</label>
                <input type="number" id="extraCredits" placeholder="0">
                <small>適用於年滿18/22歲條款</small>
            </div>
        </div>

        <label style="margin-top:15px; display:block; font-weight:700;">其他資格勾選</label>
        <div class="check-grid">
            <div class="check-item"><label><input type="checkbox" id="openUnivStudent"> <span>空中大學"選修生" (需修畢40學分)</span></label></div>
            <div class="check-item"><label><input type="checkbox" id="selfStudy"> <span>自學進修學力鑑定通過</span></label></div>
            <div class="check-item"><label><input type="checkbox" id="natExam"> <span>國家考試及格</span></label></div>
            <div class="check-item"><label><input type="checkbox" id="military"> <span>軍事考試及格</span></label></div>
            <div class="check-item"><label><input type="checkbox" id="specialRole"> <span>曾任專業技術人員/教師 (第6條)</span></label></div>
            <div class="check-item"><label><input type="checkbox" id="art"> <span>藝術教育法一貫制</span></label></div>
        </div>
    </div>

    <button class="btn-analyze" onclick="analyze()">開始全面分析 (含轉學考/二技)</button>

    <div id="resultArea" class="result-area">
        <h2 style="text-align:center; margin-bottom:30px;">📊 資格分析報告</h2>
        <div id="output"></div>
    </div>
</div>

<script>
    // 初始化設定
    const today = new Date();
    document.getElementById('targetDate').valueAsDate = new Date(today.getFullYear(), 8, 15);
    document.getElementById('leaveDate').valueAsDate = new Date(today.getFullYear()-1, 5, 30);

    function updateUI() {
        const status = document.getElementById('eduStatus').value;
        const license = document.getElementById('license').value;
        const edu = document.getElementById('eduLevel').value;
        
        document.getElementById('dateLabel').innerText = (status === 'graduated') ? "畢業日期" : "修業證明書/休學證明書離校日期";
        document.getElementById('dropoutPanel').style.display = (status === 'dropout') ? 'block' : 'none';
        
        // 為了 3-9 條(高中畢業+5年工作)，高中職畢業生也需顯示工作欄位
        const showWork = (license !== 'none') || (['high', 'vocational'].includes(edu));
        document.getElementById('workPanel').style.display = showWork ? 'block' : 'none';
    }

    function getDiffYears(d1, d2) {
        if (!d1 || !d2) return 0;
        return (new Date(d1) - new Date(d2)) / (1000 * 60 * 60 * 24 * 365.25);
    }

    function analyze() {
        // --- 1. 資料讀取 ---
        const targetDate = document.getElementById('targetDate').value;
        const leaveDate = document.getElementById('leaveDate').value;
        const yearsGap = getDiffYears(targetDate, leaveDate);
        
        const ageRange = document.getElementById('ageRange').value;
        const is18Plus = (ageRange !== 'under18');
        const is22Plus = (ageRange === '22plus');

        const edu = document.getElementById('eduLevel').value;
        const status = document.getElementById('eduStatus').value;
        const gr = parseInt(document.getElementById('lastGrade').value) || 0;
        const sem = parseInt(document.getElementById('lastSemester').value) || 1;
        const credits = parseInt(document.getElementById('credits').value) || 0;
        
        const license = document.getElementById('license').value;
        const work = parseFloat(document.getElementById('workExp').value) || 0;
        const extraCredits = parseInt(document.getElementById('extraCredits').value) || 0;
        
        const flags = {
            openUniv: document.getElementById('openUnivStudent').checked,
            selfStudy: document.getElementById('selfStudy').checked,
            natExam: document.getElementById('natExam').checked,
            military: document.getElementById('military').checked,
            special: document.getElementById('specialRole').checked,
            art: document.getElementById('art').checked
        };

        // --- 2. 核心計算：學期權重 (解決「小豬」案例) ---
        // 公式：(年級-1)*2 + 學期 (1=上, 2=下)
        // 例如：二上=3, 二下=4, 三上=5
        let totalSemesters = 0;
        if (gr > 0) {
            totalSemesters = (gr - 1) * 2 + sem;
        }

        let report = {
            freshman: { title: "大學/四技一年級 (Freshman)", pass: false, list: [] },
            transfer: { title: "轉學考 (插班大二/大三)", pass: false, list: [] },
            tech2:    { title: "二技一年級 (接續大三)", pass: false, list: [] },
            master:   { title: "碩士班 (Master)", pass: false, list: [] },
            phd:      { title: "博士班 (PhD)", pass: false, list: [] }
        };

        function add(type, msg) {
            report[type].pass = true;
            report[type].list.push(msg);
        }

        // 第6條特殊身分 (通用)
        if (flags.special) ["freshman", "transfer", "tech2", "master", "phd"].forEach(t => add(t, "曾任專業技術人員/教師 (第6條)"));

        // =====================================
        // A. 大學/四技一年級 (第2條)
        // =====================================
        if (status === 'graduated') {
            if (['high', 'vocational', 'poly_5', 'poly_3', 'poly_2', 'poly_equiv'].includes(edu)) add('freshman', "具備畢業學歷");
        } else {
            // 高中職肄業
            if (['high', 'vocational'].includes(edu) || flags.art) {
                if (totalSemesters >= 4 && yearsGap >= 2) add('freshman', "高中職肄業: 修滿高二 + 離校2年"); // 修滿高二(4學期)
                else if (totalSemesters >= 5 && yearsGap >= 1) add('freshman', "高中職肄業: 修滿高三上 + 離校1年");
                else if (totalSemesters >= 6) add('freshman', "高中職肄業: 修滿高三下");
            }
            // 五專肄業
            if (edu === 'poly_5' || flags.art) {
                // 修滿專三下 = 6學期
                if (totalSemesters >= 6 && yearsGap >= 1) add('freshman', "五專肄業: 修滿專三下 + 離校1年");
                // 修讀專四(7學期)以上
                else if (totalSemesters >= 7) add('freshman', "五專肄業: 修讀專四或專五期間");
            }
        }
        
        if (license==='C' && work>=5) add('freshman', "丙級證照 + 5年工作");
        if (license==='B' && work>=2) add('freshman', "乙級證照 + 2年工作");
        if (license==='A') add('freshman', "甲級證照");
        
        if (flags.selfStudy) add('freshman', "自學進修學力鑑定通過");
        if (flags.military) add('freshman', "軍事考試及格");
        if (flags.natExam) add('freshman', "國家考試及格");

        if (is22Plus && extraCredits>=40) add('freshman', "滿22歲 + 40推廣學分");
        if (is18Plus && extraCredits>=150) add('freshman', "滿18歲 + 150職訓學分");
        if (flags.openUniv && extraCredits>=40) add('freshman', "空大選修生 + 40學分");

        // =====================================
        // B. 轉學考 (第4條)
        // =====================================
        // 一般大學肄業
        if (edu === 'bachelor' && status === 'dropout') {
            if (totalSemesters >= 2) add('transfer', "大學修滿2學期：可轉大二上");
            if (totalSemesters >= 3) add('transfer', "大學修滿3學期：可轉大二下");
            if (totalSemesters >= 4) add('transfer', "大學修滿4學期：可轉大三上");
            if (totalSemesters >= 5) add('transfer', "大學修滿5學期：可轉大三下");
            
            // 4-2-1 二技轉學考特殊條款
            if (totalSemesters >= 5) add('transfer', "大學修滿5學期：可轉二技一年級下學期 (4-2-1)");
        }
        
        // 空大肄業全修生 (第4條第6款)
        if (edu === 'open_univ' && status === 'dropout') {
            if (credits >= 36) add('transfer', "空大全修生36學分：可轉大二");
            if (credits >= 72) add('transfer', "空大全修生72學分：可轉大三");
        }
        
        // 專科畢業
        if (status === 'graduated' && ['poly_5','poly_2','poly_3','poly_equiv'].includes(edu)) {
            add('transfer', "專科畢業具轉學資格");
        }

        // =====================================
        // C. 二技一年級 (第3條)
        // =====================================
        if (status === 'graduated') {
            if (['poly_5', 'poly_3', 'poly_2', 'poly_equiv'].includes(edu)) add('tech2', "專科畢業");
            if (['high', 'vocational'].includes(edu) && work>=5) add('tech2', "高中職畢業 + 5年工作 (3-9)");
        } else {
             // 二專肄業 (需修滿二上=3學期+離校2年，或修讀二下=4學期+離校1年)
            if (edu === 'poly_2') {
                if (totalSemesters >= 3 && yearsGap >= 2) add('tech2', "二專肄業: 修滿二上 + 離校2年");
                else if (totalSemesters >= 4 && yearsGap >= 1) add('tech2', "二專肄業: 修讀二下期間 + 離校1年");
                else if (totalSemesters >= 4 && credits>=80) add('tech2', "二專肄業: 修滿規定年限 + 80學分");
            }
            // 五專肄業 (需修滿專四=8學期+3年, 專五上=9學期+2年, 專五下=10學期+1年)
            if (edu === 'poly_5') {
                if (totalSemesters >= 8 && yearsGap >= 3) add('tech2', "五專肄業: 修滿專四 + 離校3年");
                else if (totalSemesters >= 9 && yearsGap >= 2) add('tech2', "五專肄業: 修滿專五上 + 離校2年");
                else if (totalSemesters >= 10 && yearsGap >= 1) add('tech2', "五專肄業: 修讀專五下期間 + 離校1年");
                else if (totalSemesters >= 10 && credits>=220) add('tech2', "五專肄業: 修滿規定年限 + 220學分");
            }
            // 大學肄業 (需修滿二下=4學期) - "小豬"案例修正處
            if (edu === 'bachelor' && totalSemesters >= 4) {
                 add('tech2', "大學肄業: 修滿二下 (含)以上");
            }
        }
        
        if (license==='B' && work>=4) add('tech2', "乙級證照 + 4年工作");
        if (license==='A' && work>=2) add('tech2', "甲級證照 + 2年工作");
        if (flags.natExam) add('tech2', "國家考試及格");
        
        // 3-8條款 (具備大學報考資格 + 22歲 + 80學分)
        if (is22Plus && extraCredits>=80 && report.freshman.pass) {
             add('tech2', "滿22歲 + 具大學報考資格 + 80學分 (3-8)");
        }

        // =====================================
        // D. 碩士 (第5條)
        // =====================================
        if (status === 'graduated') {
            if (edu === 'bachelor') add('master', "大學畢業");
            if (['poly_5', 'poly_2', 'poly_equiv'].includes(edu) && yearsGap>=3) add('master', "二專/五專畢業 + 離校3年");
            if (edu === 'poly_3' && yearsGap>=2) add('master', "三專畢業 + 離校2年");
        } else {
            // 大學肄業 (需修滿大三=6學期+離校2年, 或修滿大四=8學期+離校1年)
            if (edu === 'bachelor') {
                if (totalSemesters >= 6 && yearsGap >= 2) add('master', "大學肄業: 修滿大三 + 離校2年");
                if (totalSemesters >= 8 && yearsGap >= 1) add('master', "大學肄業: 修滿規定年限 + 離校1年");
            }
        }
        if (license==='A' && work>=3) add('master', "甲級證照 + 3年工作");
        if (license==='B' && work>=5) add('master', "乙級證照 + 5年工作");
        if (flags.natExam) add('master', "國家考試及格");

        // =====================================
        // E. 博士 (第8條)
        // =====================================
        if (status === 'graduated') {
            if (edu === 'master') add('phd', "碩士畢業");
            if (edu === 'bachelor' && work>=5) add('phd', "學士畢業 + 5年工作");
        } else {
             // 碩士肄業 (修滿2年=4學期 + 離校1年)
            if (edu === 'master' && totalSemesters >= 4 && yearsGap >= 1) add('phd', "碩士肄業: 修滿2年 + 離校1年");
        }
        if (flags.natExam && work>=6) add('phd', "高考及格 + 6年工作");

        // --- 渲染 ---
        const out = document.getElementById('output');
        out.innerHTML = "";
        
        const types = [report.freshman, report.transfer, report.tech2, report.master, report.phd];
        types.forEach(t => {
            const cls = t.pass ? "pass" : "fail";
            const badgeTxt = t.pass ? "✅ 符合" : "未符合";
            let html = `
                <div class="result-card ${cls}">
                    <span class="badge ${cls}">${badgeTxt}</span>
                    <div class="card-title">${t.title}</div>
            `;
            if (t.pass) {
                html += `<ul class="reason-list">${t.list.map(l=>`<li>${l}</li>`).join('')}</ul>`;
            } else {
                html += `<div style="color:#7f8c8d; font-size:0.95rem;">未符合法規要求</div>`;
            }
            html += `</div>`;
            out.innerHTML += html;
        });

        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
